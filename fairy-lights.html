<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ Fairy Lights</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    min-height: 100vh;
    overflow: hidden;
    cursor: none;
    font-family: 'Playfair Display', serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  canvas {
    position: fixed;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 10;
  }

  .center-text {
    position: relative;
    z-index: 5;
    text-align: center;
    pointer-events: none;
    user-select: none;
  }

  .center-text h1 {
    font-size: clamp(2rem, 6vw, 5rem);
    color: white;
    letter-spacing: 0.04em;
    line-height: 1.15;
    text-shadow:
      0 0 40px rgba(255,255,255,0.3),
      0 0 80px rgba(255,200,100,0.15);
  }

  .center-text p {
    margin-top: 1.2rem;
    font-size: clamp(0.85rem, 2vw, 1.1rem);
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-family: 'Courier New', monospace;
    font-weight: normal;
  }

  /* Custom cursor dot */
  .cursor-dot {
    position: fixed;
    width: 8px; height: 8px;
    background: white;
    border-radius: 50%;
    pointer-events: none;
    z-index: 100;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 10px white, 0 0 20px white;
    transition: transform 0.05s;
  }

  /* Subtle vignette */
  .vignette {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 1;
  }
</style>
</head>
<body>

<div class="vignette"></div>
<div class="cursor-dot" id="cursorDot"></div>

<div class="center-text">
  <h1>Move your finger<br>to cast magic ✨</h1>
  <p>fairy lights trail</p>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const cursorDot = document.getElementById('cursorDot');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

// Particle pool
const particles = [];
let mouseX = window.innerWidth / 2;
let mouseY = window.innerHeight / 2;
let lastX = mouseX, lastY = mouseY;
let isMoving = false;
let moveTimer;

// Rainbow hue cycle
let hue = 0;

// Colors inspired by fairy lights
const colors = [
  '#ff6b6b', '#ff9f43', '#ffeaa7', '#55efc4',
  '#74b9ff', '#a29bfe', '#fd79a8', '#fdcb6e',
  '#00cec9', '#e17055', '#81ecec', '#fab1a0'
];

class Particle {
  constructor(x, y) {
    this.x = x + (Math.random() - 0.5) * 20;
    this.y = y + (Math.random() - 0.5) * 20;
    this.color = colors[Math.floor(Math.random() * colors.length)];
    this.size = Math.random() * 6 + 2;
    this.maxSize = this.size;
    this.alpha = 1;
    this.vx = (Math.random() - 0.5) * 2.5;
    this.vy = (Math.random() - 0.5) * 2.5 - 0.8;
    this.gravity = 0.04;
    this.life = 1;
    this.decay = Math.random() * 0.018 + 0.008;
    this.twinkle = Math.random() * Math.PI * 2;
    this.twinkleSpeed = Math.random() * 0.2 + 0.05;
    // Wire-like tail
    this.tail = [];
    this.tailLength = Math.floor(Math.random() * 8) + 4;
    this.isSparkle = Math.random() > 0.6;
  }

  update() {
    this.tail.unshift({ x: this.x, y: this.y });
    if (this.tail.length > this.tailLength) this.tail.pop();

    this.x += this.vx;
    this.y += this.vy;
    this.vy += this.gravity;
    this.vx *= 0.98;
    this.life -= this.decay;
    this.alpha = this.life;
    this.twinkle += this.twinkleSpeed;
    // Twinkling size
    this.size = this.maxSize * (0.7 + 0.3 * Math.sin(this.twinkle));
  }

  draw() {
    if (this.life <= 0) return;

    // Draw wire tail
    if (this.tail.length > 1) {
      ctx.beginPath();
      ctx.moveTo(this.tail[0].x, this.tail[0].y);
      for (let i = 1; i < this.tail.length; i++) {
        ctx.lineTo(this.tail[i].x, this.tail[i].y);
      }
      ctx.strokeStyle = `rgba(255,255,255,${this.alpha * 0.15})`;
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }

    const twinkleAlpha = this.alpha * (0.6 + 0.4 * Math.sin(this.twinkle));

    if (this.isSparkle) {
      // Star/sparkle shape
      drawStar(ctx, this.x, this.y, 4, this.size, this.size * 0.4, this.color, twinkleAlpha);
    } else {
      // Glowing circle (bulb)
      const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 2.5);
      grad.addColorStop(0, hexToRgba(this.color, twinkleAlpha));
      grad.addColorStop(0.4, hexToRgba(this.color, twinkleAlpha * 0.6));
      grad.addColorStop(1, hexToRgba(this.color, 0));

      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * 2.5, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();

      // Core bright dot
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${twinkleAlpha})`;
      ctx.fill();
    }
  }

  isDead() { return this.life <= 0; }
}

function drawStar(ctx, cx, cy, spikes, outerR, innerR, color, alpha) {
  let rot = (Math.PI / 2) * 3;
  const step = Math.PI / spikes;

  // Glow
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, outerR * 2);
  grad.addColorStop(0, hexToRgba(color, alpha * 0.8));
  grad.addColorStop(1, hexToRgba(color, 0));
  ctx.beginPath();
  ctx.arc(cx, cy, outerR * 2, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // Star shape
  ctx.beginPath();
  ctx.moveTo(cx, cy - outerR);
  for (let i = 0; i < spikes; i++) {
    ctx.lineTo(cx + Math.cos(rot) * outerR, cy + Math.sin(rot) * outerR);
    rot += step;
    ctx.lineTo(cx + Math.cos(rot) * innerR, cy + Math.sin(rot) * innerR);
    rot += step;
  }
  ctx.lineTo(cx, cy - outerR);
  ctx.closePath();
  ctx.fillStyle = `rgba(255,255,255,${alpha})`;
  ctx.fill();
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// Spawn burst on click/touch
function spawnBurst(x, y, count = 25) {
  for (let i = 0; i < count; i++) {
    const p = new Particle(x, y);
    p.vx = (Math.random() - 0.5) * 8;
    p.vy = (Math.random() - 0.5) * 8;
    p.maxSize = Math.random() * 8 + 3;
    p.size = p.maxSize;
    p.decay = Math.random() * 0.012 + 0.005;
    particles.push(p);
  }
}

// Continuous trail
let frameCount = 0;
function spawnTrail(x, y) {
  const dx = x - lastX;
  const dy = y - lastY;
  const speed = Math.sqrt(dx*dx + dy*dy);
  const count = Math.min(Math.floor(speed / 4) + 1, 6);
  for (let i = 0; i < count; i++) {
    particles.push(new Particle(
      lastX + dx * (i / count),
      lastY + dy * (i / count)
    ));
  }
}

// Ambient idle sparkles
function spawnAmbient() {
  if (!isMoving) {
    if (Math.random() > 0.7) {
      const p = new Particle(mouseX, mouseY);
      p.vx = (Math.random() - 0.5) * 1.5;
      p.vy = -(Math.random() * 1.5 + 0.5);
      p.decay = 0.015;
      particles.push(p);
    }
  }
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  spawnAmbient();

  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update();
    particles[i].draw();
    if (particles[i].isDead()) particles.splice(i, 1);
  }

  lastX = mouseX;
  lastY = mouseY;
  requestAnimationFrame(animate);
}

// Mouse
document.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  cursorDot.style.left = mouseX + 'px';
  cursorDot.style.top = mouseY + 'px';
  spawnTrail(mouseX, mouseY);
  isMoving = true;
  clearTimeout(moveTimer);
  moveTimer = setTimeout(() => isMoving = false, 100);
});

document.addEventListener('click', (e) => {
  spawnBurst(e.clientX, e.clientY, 35);
});

// Touch support
document.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  mouseX = t.clientX;
  mouseY = t.clientY;
  cursorDot.style.left = mouseX + 'px';
  cursorDot.style.top = mouseY + 'px';
  spawnTrail(mouseX, mouseY);
  isMoving = true;
  clearTimeout(moveTimer);
  moveTimer = setTimeout(() => isMoving = false, 100);
}, { passive: false });

document.addEventListener('touchstart', (e) => {
  const t = e.touches[0];
  spawnBurst(t.clientX, t.clientY, 30);
});

animate();
</script>
</body>
</html>
